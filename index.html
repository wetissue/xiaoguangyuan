<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>小光源</title>

  <!-- PWA & iOS Add to Home Screen -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="小光源">
  <meta name="theme-color" content="#FFF8F0">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">


  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Helvetica Neue', sans-serif;
      background: #FFF8F0;
      color: #3a2818;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      height: 100dvh;
    }

    .app {
      max-width: 375px;
      margin: 0 auto;
      height: 100dvh;
      overflow: hidden;
      position: relative;
    }

    /* ── Views ── */
    .view {
      display: none;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
    }
    .view.active { display: flex; }

    .view-scroll {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .view-scroll::-webkit-scrollbar { display: none; }

    /* ── Home ── */
    #v-home {
      position: relative;
      overflow: hidden;
    }
    .home-scroll {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 0 22px;
      padding-bottom: calc(env(safe-area-inset-bottom, 16px) + 70px);
      -ms-overflow-style: none;
      scrollbar-width: none;
      display: flex;
      flex-direction: column;
    }
    .home-scroll::-webkit-scrollbar { display: none; }

    /* bg blobs */
    .home-blob1 {
      position: absolute; top: 0; right: 0; pointer-events: none; opacity: 0.35;
    }
    .home-blob2 {
      position: absolute; bottom: 120px; left: -20px; pointer-events: none; opacity: 0.2;
    }

    /* Header */
    .home-header {
      flex-shrink: 0;
      padding-top: calc(env(safe-area-inset-top, 44px) + 6px);
      margin-bottom: 24px;
      position: relative;
    }
    .home-brand {
      display: flex; align-items: center; gap: 6px; margin-bottom: 6px;
    }
    .home-brand span {
      font-size: 12px; color: #c8906a; font-weight: 600; letter-spacing: 1.5px;
    }
    .home-greeting {
      font-size: 26px; font-weight: 700; color: #3a2818; line-height: 1.2; margin-bottom: 4px;
    }
    .home-date-text {
      font-size: 13px; color: #9a7858; font-weight: 300;
    }

    /* Progress card */
    .progress-card {
      flex-shrink: 0;
      border-radius: 20px;
      padding: 16px 18px;
      margin-bottom: 12px;
      position: relative;
      overflow: hidden;
    }
    .progress-card.incomplete {
      background: linear-gradient(135deg, #fff8ec, #ffeeda);
      box-shadow: 0 2px 12px rgba(180,110,40,.09);
    }
    .progress-card.complete {
      background: linear-gradient(135deg, #f9cf60, #f5a030);
      box-shadow: 0 4px 20px rgba(245,160,48,.28);
    }
    .progress-top {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px;
    }
    .progress-title { font-weight: 700; font-size: 15px; }
    .progress-status { font-size: 12px; margin-top: 2px; }
    .progress-badge {
      border-radius: 14px; padding: 6px 14px; text-align: center;
    }
    .progress-badge-num { font-size: 24px; font-weight: 700; line-height: 1; }
    .progress-badge-den { font-size: 11px; }
    .progress-bars { display: flex; gap: 8px; }
    .progress-bar {
      flex: 1; height: 6px; border-radius: 3px; transition: all 0.4s;
    }

    /* Record button */
    .btn-record {
      flex-shrink: 0;
      width: 100%; border: none; border-radius: 18px; padding: 16px 20px;
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; margin-bottom: 10px;
      transition: transform 0.15s, box-shadow 0.15s;
      font-family: inherit;
    }
    .btn-record:active { transform: scale(0.97); }
    .btn-record.can-add {
      background: linear-gradient(135deg, #f5a840, #e8795a);
      box-shadow: 0 6px 18px rgba(240,120,60,.25);
    }
    .btn-record.full {
      background: #ecddd0;
      box-shadow: none; cursor: default;
    }
    .btn-record-icon {
      width: 40px; height: 40px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center; font-size: 20px;
    }

    /* Streak */
    .streak-card {
      background: white; border-radius: 16px; padding: 12px 16px;
      display: flex; align-items: center; gap: 10px;
      border: 1px solid #f0dfc8; margin-top: 6px; flex-shrink: 0;
    }

    /* Entry cards */
    .entries-section {
      margin-top: 14px; flex-shrink: 0;
    }
    .entries-wrap {
      border-radius: 18px;
      scrollbar-width: thin;
      scrollbar-color: #e0cbb0 transparent;
    }
    .entries-wrap.multi {
      max-height: 220px; overflow-y: auto;
    }
    .entry-cards { display: flex; flex-direction: column; gap: 8px; }

    .swipe-wrap {
      position: relative; overflow: hidden; border-radius: 16px;
    }
    .swipe-actions {
      position: absolute; right: 0; top: 0; bottom: 0;
      display: flex; align-items: stretch; width: 120px;
    }
    .swipe-btn {
      flex: 1; border: none; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;
    }
    .swipe-btn.edit { background: #5b9cf6; }
    .swipe-btn.del { background: #e05a3a; }
    .swipe-btn span { font-size: 10px; color: white; font-weight: 600; }

    .swipe-content {
      position: relative; z-index: 1;
      transition: transform 0.28s cubic-bezier(.4,0,.2,1);
      user-select: none; -webkit-user-select: none;
    }

    .entry-card-inner {
      padding: 11px 12px;
      display: flex; align-items: flex-start; gap: 10px;
    }
    .entry-emoji { font-size: 16px; flex-shrink: 0; margin-top: 2px; }
    .entry-text { flex: 1; min-width: 0; }
    .entry-reason-line {
      font-size: 14px; color: #3a2818; line-height: 1.5;
      display: flex; align-items: baseline; gap: 0;
    }
    .entry-reason-line.collapsed {
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .entry-reason-line span.label { flex-shrink: 0; }
    .entry-reason-line span.value {
      font-weight: 600; flex: 1; min-width: 0;
    }
    .entry-reason-line span.value.collapsed {
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .entry-event-line {
      font-size: 12px; color: #9a7858; line-height: 1.6; margin-top: 3px;
      display: flex; align-items: baseline; gap: 0;
    }
    .entry-event-line.collapsed {
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .entry-event-line span.label { flex-shrink: 0; }
    .entry-event-line span.value {
      font-weight: 600; flex: 1; min-width: 0;
    }
    .entry-event-line span.value.collapsed {
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .entry-chevron {
      flex-shrink: 0; margin-top: 4px; transition: transform 0.25s;
    }
    .entry-chevron.open { transform: rotate(180deg); }

    /* Context menu */
    .ctx-backdrop { position: fixed; inset: 0; z-index: 300; }
    .ctx-menu {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      z-index: 301; background: white; border-radius: 16px;
      box-shadow: 0 8px 32px rgba(40,20,5,.18);
      overflow: hidden; min-width: 130px;
    }
    .ctx-btn {
      width: 100%; border: none; background: none; padding: 13px 18px;
      display: flex; align-items: center; gap: 10px; cursor: pointer;
      font-size: 14px; font-weight: 500; font-family: inherit;
    }
    .ctx-btn.edit-ctx { color: #3a2818; }
    .ctx-btn.del-ctx { color: #e05a3a; }
    .ctx-sep { height: 0.5px; background: #f0e4d4; margin: 0 14px; }

    /* Quote */
    .home-quote {
      margin-top: auto; padding-top: 18px; padding-bottom: 10px; text-align: center;
    }
    .home-quote p {
      font-size: 12px; color: #b89878; line-height: 1.4; font-style: italic;
    }

    /* ── Tab Bar ── */
    .tab-bar {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 375px;
      background: rgba(253,247,240,.94);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-top: 0.5px solid rgba(190,160,120,.3);
      display: flex; align-items: flex-start;
      padding-top: 4px;
      padding-bottom: env(safe-area-inset-bottom, 16px);
      z-index: 100;
    }
    .tab-bar.hidden { display: none; }
    .tab-item {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; gap: 3px;
      padding: 6px 0 4px; cursor: pointer;
      min-height: 44px; user-select: none;
      transition: color 0.15s; border: none; background: none;
      font-family: inherit;
    }
    .tab-item:active { opacity: 0.5; }
    .tab-item svg { width: 24px; height: 24px; }
    .tab-item span { font-size: 10px; font-weight: 500; }
    .tab-item.active span { color: #f5a840; }
    .tab-item.inactive span { color: #8a7060; }
    .tab-item.disabled span { color: #c8b8a0; }

    /* ── History ── */
    .history-header {
      flex-shrink: 0;
      padding: calc(env(safe-area-inset-top, 44px) + 16px) 22px 12px;
      background: rgba(253,247,240,.95);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      display: flex; align-items: center; justify-content: space-between;
      z-index: 5;
    }
    .history-title { font-weight: 700; font-size: 22px; color: #3a2818; }
    .history-count {
      font-size: 12px; color: #9a7858; background: #f5ede0;
      border-radius: 10px; padding: 4px 10px;
    }

    /* Mini calendar */
    .mini-cal {
      background: white; border-radius: 18px; padding: 14px 16px;
      box-shadow: 0 2px 12px rgba(160,90,30,.06); margin: 0 22px 14px;
    }
    .mini-cal-header {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;
    }
    .mini-cal-grid { display: flex; gap: 3px; flex-wrap: wrap; }
    .mini-cal-day {
      width: 27px; height: 27px; border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px;
    }

    /* History list */
    .history-list { padding: 0 22px 32px; display: flex; flex-direction: column; gap: 10px; }
    .history-date-card {
      background: white; border-radius: 20px; overflow: hidden;
      box-shadow: 0 2px 10px rgba(160,90,30,.06);
    }
    .history-date-btn {
      width: 100%; background: none; border: none; padding: 14px 16px;
      cursor: pointer; display: flex; align-items: center; justify-content: space-between;
      font-family: inherit;
    }
    .history-date-left { display: flex; align-items: center; gap: 12px; }
    .history-date-icon {
      width: 42px; height: 42px; border-radius: 12px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .history-date-right { display: flex; align-items: center; gap: 6px; }
    .history-dots { display: flex; gap: 3px; }
    .history-dot { width: 7px; height: 7px; border-radius: 50%; }
    .history-chevron { transition: transform 0.28s; display: flex; }
    .history-chevron.open { transform: rotate(90deg); }

    .history-detail {
      border-top: 1px solid #f5ece0; padding: 0 14px 14px;
    }
    .history-entry {
      margin-top: 10px; border-radius: 14px; padding: 12px 14px;
    }

    /* ── Modal overlay ── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 200;
      pointer-events: none;
    }
    .modal-overlay.open { pointer-events: all; }
    .modal-backdrop {
      position: absolute; inset: 0;
      background: rgba(40,20,5,0);
      transition: background 0.4s ease;
    }
    .modal-overlay.open .modal-backdrop { background: rgba(40,20,5,0.3); }
    .modal-sheet {
      position: absolute; top: 30px; left: 0; right: 0; bottom: 0;
      background: #fdf7f0; border-radius: 22px 22px 0 0;
      overflow: hidden;
      transform: translateY(100%);
      transition: transform 0.42s cubic-bezier(.32,.72,0,1);
    }
    .modal-overlay.open .modal-sheet { transform: translateY(0); }
    .modal-handle {
      width: 36px; height: 4px; border-radius: 2px;
      background: #d8c8b4; margin: 10px auto 0;
    }
    .modal-inner {
      height: 100%; display: flex; flex-direction: column;
    }
    .modal-header {
      padding: 14px 20px 0; display: flex; align-items: center; gap: 10px; flex-shrink: 0;
    }
    .modal-back {
      background: rgba(255,255,255,.7); border: none; border-radius: 11px;
      width: 34px; height: 34px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
    }
    .modal-title-wrap { flex: 1; }
    .modal-title { font-weight: 700; font-size: 15px; color: #3a2818; }
    .modal-subtitle { font-size: 11px; color: #9a7858; }
    .step-dots { display: flex; gap: 5px; align-items: center; }
    .step-dot { height: 7px; border-radius: 4px; transition: all 0.3s; }

    .form-area {
      flex: 1; padding: 16px 18px 20px; display: flex; flex-direction: column;
      min-height: 0; overflow-y: auto;
    }
    .form-card {
      background: white; border-radius: 22px; padding: 20px 18px;
      flex: 1; box-shadow: 0 3px 16px rgba(160,90,30,.08);
      display: flex; flex-direction: column;
    }
    .form-card-header {
      display: flex; align-items: center; gap: 10px; margin-bottom: 18px;
    }
    .form-card-icon {
      width: 42px; height: 42px; border-radius: 13px;
      display: flex; align-items: center; justify-content: center; font-size: 20px;
    }
    .form-label {
      font-size: 11px; font-weight: 600; margin-bottom: 7px; letter-spacing: 0.5px;
    }
    .form-textarea {
      width: 100%; border: none; border-radius: 13px; padding: 12px 14px;
      font-size: 14px; color: #3a2818; font-family: inherit;
      resize: none; outline: none; line-height: 1.7;
    }
    .btn-save {
      width: 100%; margin-top: 12px; border: none; border-radius: 18px;
      padding: 16px; font-weight: 700; font-size: 16px;
      cursor: pointer; font-family: inherit;
      transition: all 0.18s;
    }
    .btn-save:disabled { cursor: default; }

    /* Saved confirmation */
    .saved-screen {
      height: 100%; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 14px;
      padding: 40px; background: #fdf7f0;
      overflow-y: auto; -webkit-overflow-scrolling: touch;
    }
    .saved-emoji {
      font-size: 68px;
      animation: pop 0.5s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes pop {
      0% { transform: scale(0); opacity: 0; }
      70% { transform: scale(1.2); }
      100% { transform: scale(1); opacity: 1; }
    }
    .btn-continue {
      width: 100%; border: none; border-radius: 18px; padding: 15px;
      font-weight: 700; font-size: 16px; cursor: pointer; font-family: inherit;
    }

    /* Delete confirm */
    .delete-overlay {
      position: fixed; inset: 0; z-index: 200;
      display: flex; align-items: center; justify-content: center;
      background: rgba(40,20,5,.38);
    }
    .delete-dialog {
      background: white; border-radius: 22px; padding: 28px 24px 20px;
      width: 300px; box-shadow: 0 20px 60px rgba(40,20,5,.2);
    }
    .delete-btns { display: flex; gap: 10px; }
    .delete-btn {
      flex: 1; border: none; border-radius: 14px; padding: 13px;
      font-weight: 600; font-size: 15px; cursor: pointer; font-family: inherit;
    }

    /* Coming soon */
    .coming-soon {
      height: 100%; background: #fdf7f0;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 14px; padding: 40px;
    }
    .coming-icon {
      width: 72px; height: 72px; border-radius: 22px; background: #f5ede0;
      display: flex; align-items: center; justify-content: center; font-size: 32px;
    }
    .coming-badge {
      background: #f5e8d4; border-radius: 20px; padding: 7px 18px;
      font-size: 12px; color: #c8906a; font-weight: 600; letter-spacing: 0.5px;
    }

    /* Empty */
    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 12px; padding: 60px;
    }

    /* ── Login ── */
    .login-view {
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100dvh; padding: 40px 30px;
      background: #FFF8F0; text-align: center;
    }
    .login-view.active { display: flex; }
    .login-logo { font-size: 52px; margin-bottom: 8px; }
    .login-title { font-size: 26px; font-weight: 700; color: #3a2818; margin-bottom: 4px; }
    .login-sub { font-size: 14px; color: #9a7858; margin-bottom: 32px; }
    .login-input {
      width: 100%; padding: 14px 16px; border: 1.5px solid #f0dfc8;
      border-radius: 14px; font-size: 16px; color: #3a2818;
      background: #FFFDF7; outline: none; font-family: inherit;
      margin-bottom: 12px; transition: border-color 0.2s;
    }
    .login-input:focus { border-color: #f5a840; }
    .login-input::placeholder { color: #c8a888; }
    .login-btn {
      width: 100%; padding: 15px; border: none; border-radius: 16px;
      font-size: 16px; font-weight: 700; cursor: pointer;
      font-family: inherit; transition: opacity 0.15s;
    }
    .login-btn:active { opacity: 0.8; }
    .login-btn.primary {
      background: linear-gradient(135deg, #f5a840, #e8795a);
      color: white; box-shadow: 0 4px 14px rgba(240,120,60,.25);
      margin-bottom: 10px;
    }
    .login-btn.secondary {
      background: white; color: #f5a840;
      border: 1.5px solid #f0dfc8;
    }
    .login-error {
      color: #e05a3a; font-size: 13px; margin-bottom: 12px;
      min-height: 20px;
    }
    .login-loading {
      color: #9a7858; font-size: 14px;
    }

    /* ── Profile page ── */
    .profile-page {
      padding: calc(env(safe-area-inset-top, 44px) + 20px) 22px 20px;
      display: flex; flex-direction: column; align-items: center;
      height: 100%; background: #fdf7f0;
    }
    .profile-avatar {
      width: 72px; height: 72px; border-radius: 50%;
      background: linear-gradient(135deg, #f5a840, #e8795a);
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; color: white; font-weight: 700;
      margin-bottom: 14px;
    }
    .profile-email { font-size: 14px; color: #9a7858; margin-bottom: 24px; }
    .profile-btn {
      width: 100%; padding: 14px; border: 1.5px solid #f0dfc8;
      border-radius: 16px; background: white; font-size: 15px;
      font-weight: 600; color: #e05a3a; cursor: pointer;
      font-family: inherit;
    }

    /* ── Nav bar ── */
    .nav-bar {
      flex-shrink: 0;
      display: flex; align-items: flex-end; justify-content: center;
      position: relative;
      height: calc(44px + env(safe-area-inset-top, 44px));
      padding-bottom: 8px;
      padding-top: env(safe-area-inset-top, 44px);
    }
    .nav-bar-title { font-size: 17px; font-weight: 600; color: #3a2818; }
    .nav-back {
      position: absolute; left: 8px; bottom: 6px;
      background: none; border: none;
      font-size: 15px; color: #f5a840; cursor: pointer;
      padding: 6px 8px; display: flex; align-items: center; gap: 3px;
      font-family: inherit; min-height: 44px; min-width: 44px;
    }
  </style>
</head>
<body>
<div class="app">

  <!-- ══ LOGIN ══ -->
  <div class="login-view active" id="v-login">
    <div class="login-logo">🌻</div>
    <div class="login-title">小光源</div>
    <div class="login-sub">每天记录 3 件开心的事</div>
    <input class="login-input" id="login-email" type="email" placeholder="邮箱地址" autocomplete="email">
    <input class="login-input" id="login-password" type="password" placeholder="密码（至少6位）" autocomplete="current-password">
    <div class="login-error" id="login-error"></div>
    <button class="login-btn primary" onclick="doLogin()">登录</button>
    <button class="login-btn secondary" onclick="doRegister()">注册新账号</button>
  </div>

  <!-- ══ LOADING ══ -->
  <div class="login-view" id="v-loading">
    <div class="login-logo">🌻</div>
    <div class="login-loading">加载中...</div>
  </div>

  <!-- ══ HOME ══ -->
  <div class="view" id="v-home">
    <svg class="home-blob1" width="200" height="180" viewBox="0 0 200 180">
      <circle cx="180" cy="20" r="80" fill="#f5ddb0"/>
      <circle cx="140" cy="100" r="40" fill="#f8c87a" opacity="0.5"/>
    </svg>
    <svg class="home-blob2" width="120" height="120" viewBox="0 0 120 120">
      <circle cx="20" cy="100" r="60" fill="#f5a840"/>
    </svg>

    <div class="home-scroll">
      <div class="home-header">
        <div class="home-brand">

<script src="supabase.min.js"></script>
<script>
// ── Constants ──
const EMOJIS = ['🌸','🌈','✨'];
const ACCENTS = ['#f5a840','#e8845a','#e8b840'];
const BG_COLORS = ['#fff9f0','#fff5f0','#fffbf0'];
const LIGHT_COLORS = ['#ffefd4','#ffdece','#fff3d0'];
const NUM_NAMES = ['一','二','三'];

// ── Supabase Init ──
var sb;
try {
  sb = window.supabase.createClient(
    'https://ubuthvnbbrwvefamhswn.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVidXRodm5iYnJ3dmVmYW1oc3duIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNTg4OTMsImV4cCI6MjA5MjkzNDg5M30.ot10WvLw1_T1fxdMkRdd9nTzG1UuN3zQfYpN-zzrKks'
  );
} catch(e) {
  alert('Supabase初始化失败: ' + e.message);
}

// ── State ──
let currentTab = 'home';
let editingEntry = null;
let deleteTarget = null;
let historyExpanded = null;
let openEntries = {};
let appData = {}; // cached data from Firestore
let currentUser = null;

// ── Storage (Supabase) ──
function load() { return appData; }

function saveDay(dateKey, entries) {
  if (entries && entries.length > 0) {
    appData[dateKey] = entries;
  } else {
    delete appData[dateKey];
  }
  if (!currentUser) return;
  if (entries && entries.length > 0) {
    sb.from('days').upsert({
      user_id: currentUser.id,
      date_key: dateKey,
      entries: entries
    }, { onConflict: 'user_id,date_key' }).then();
  } else {
    sb.from('days').delete()
      .eq('user_id', currentUser.id)
      .eq('date_key', dateKey).then();
  }
}

async function loadAllFromSupabase() {
  if (!currentUser) return {};
  const { data, error } = await sb.from('days')
    .select('date_key, entries')
    .eq('user_id', currentUser.id);
  if (error) { console.error('Load error:', error); return {}; }
  const result = {};
  (data || []).forEach(row => { result[row.date_key] = row.entries || []; });
  return result;
}

function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

// ── Helpers ──
function fmtDate(k) {
  const [y,m,d] = k.split('-');
  return `${y}年${+m}月${+d}日`;
}
function fmtWeek(k) {
  const ws = ['日','一','二','三','四','五','六'];
  return '周' + ws[new Date(k.replace(/-/g,'/')).getDay()];
}
function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}
function stripPrefix(text, prefix) {
  return text.startsWith(prefix) ? text.slice(prefix.length) : text;
}

function getGreeting() {
  const h = new Date().getHours();
  if (h < 6)  return '夜深了，还没睡吗';
  if (h < 11) return '早安，新的一天 ☀️';
  if (h < 14) return '中午好，吃了吗';
  if (h < 18) return '下午好，状态还好吧';
  if (h < 22) return '晚上好，今天怎么样';
  return '睡前来记录一下吧';
}

function getStreak(records) {
  let s = 0, d = new Date();
  while (true) {
    const k = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    if (!records[k] || records[k].length === 0) break;
    s++; d.setDate(d.getDate() - 1);
  }
  return s;
}

// ── Auth ──
function showScreen(id) {
  document.querySelectorAll('.login-view,.view').forEach(v => v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

async function doLogin() {
  const errEl = document.getElementById('login-error');
  try {
    const email = document.getElementById('login-email').value.trim();
    const pass = document.getElementById('login-password').value;
    errEl.textContent = '';
    if (!email || !pass) { errEl.textContent = '请填写邮箱和密码'; return; }
    errEl.textContent = '正在登录...';
    errEl.style.color = '#999';
    const result = await Promise.race([
      sb.auth.signInWithPassword({ email, password: pass }),
      new Promise((_, reject) => setTimeout(() => reject(new Error('连接超时，Supabase服务器可能无法访问')), 10000))
    ]);
    if (result.error) {
      errEl.style.color = '#e74c3c';
      const msgs = { 'Invalid login credentials': '邮箱或密码错误', 'Email not confirmed': '请先验证邮箱' };
      errEl.textContent = msgs[result.error.message] || result.error.message;
    }
  } catch (e) {
    errEl.style.color = '#e74c3c';
    errEl.textContent = '登录失败: ' + e.message;
  }
}

async function doRegister() {
  var errEl = document.getElementById('login-error');
  try {
    var email = document.getElementById('login-email').value.trim();
    var pass = document.getElementById('login-password').value;
    errEl.textContent = '';
    if (!email || !pass) { errEl.textContent = '请填写邮箱和密码'; return; }
    if (pass.length < 6) { errEl.textContent = '密码至少需要6位'; return; }
    errEl.textContent = '正在注册...';
    errEl.style.color = '#999';
    var result = await sb.auth.signUp({ email: email, password: pass });
    if (result.error) {
      errEl.style.color = '#e74c3c';
      var msgs = { 'User already registered': '该邮箱已注册，请直接登录' };
      errEl.textContent = msgs[result.error.message] || result.error.message;
    } else {
      errEl.style.color = '#27ae60';
      errEl.textContent = '注册成功，正在登录...';
    }
  } catch (e) {
    errEl.style.color = '#e74c3c';
    errEl.textContent = '注册失败: ' + e.message;
  }
}

async function doLogout() {
  await sb.auth.signOut();
}

async function onAuthChange(user) {
  if (user) {
    currentUser = user;
    document.querySelectorAll('.login-view').forEach(v => v.classList.remove('active'));
    document.getElementById('v-loading').classList.add('active');
    try {
      appData = await loadAllFromSupabase();
    } catch(e) {
      console.error('Failed to load data:', e);
      appData = {};
    }
    document.getElementById('profile-email').textContent = user.email;
    document.getElementById('profile-avatar').textContent = (user.email || '?')[0].toUpperCase();
    document.getElementById('v-loading').classList.remove('active');
    document.getElementById('tab-bar').classList.remove('hidden');
    switchTab('home');
  } else {
    currentUser = null;
    appData = {};
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('tab-bar').classList.add('hidden');
    document.getElementById('v-login').classList.add('active');
    document.getElementById('login-email').value = '';
    document.getElementById('login-password').value = '';
    document.getElementById('login-error').textContent = '';
  }
}

// Listen for auth state changes
sb.auth.onAuthStateChange((event, session) => {
  onAuthChange((session && session.user) || null);
});

// Check initial session
sb.auth.getSession().then(({ data: { session } }) => {
  onAuthChange((session && session.user) || null);
});

// ── Tab switching ──
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab-item').forEach(t => {
    t.classList.remove('active','inactive');
    if (t.id === 'tab-'+tab) {
      t.classList.add('active');
    } else if (!t.classList.contains('disabled')) {
      t.classList.add('inactive');
    }
  });

  // Update tab icons
  const homeActive = tab === 'home';
  document.getElementById('tab-home-path').setAttribute('fill', homeActive ? '#f5a840' : 'none');
  document.getElementById('tab-home-path').setAttribute('stroke', homeActive ? '#f5a840' : '#b8a48e');
  const histActive = tab === 'history';
  document.getElementById('tab-hist-rect').setAttribute('fill', histActive ? 'rgba(245,168,64,0.12)' : 'none');
  document.getElementById('tab-hist-rect').setAttribute('stroke', histActive ? '#f5a840' : '#b8a48e');
  document.getElementById('tab-hist-path').setAttribute('stroke', histActive ? '#f5a840' : '#b8a48e');
  const profActive = tab === 'profile';
  document.getElementById('tab-prof-circle').setAttribute('stroke', profActive ? '#f5a840' : '#b8a48e');
  document.getElementById('tab-prof-path').setAttribute('stroke', profActive ? '#f5a840' : '#b8a48e');

  // Always show the view first, then render content
  const viewId = { home:'v-home', history:'v-history', explore:'v-explore', profile:'v-profile' }[tab];
  if (viewId) document.getElementById(viewId).classList.add('active');
  document.getElementById('tab-bar').classList.remove('hidden');

  try {
    if (tab === 'home') { renderHome(); }
    else if (tab === 'history') { historyExpanded = null; renderHistory(); }
  } catch(e) { console.error('render error:', e); }
}

// ── HOME ──
function renderHome() {
  const records = load();
  const today = todayKey();
  const todayRecs = records[today] || [];
  const count = todayRecs.length;
  const filled = count >= 3;

  // Greeting
  document.getElementById('home-greeting').textContent = getGreeting();
  document.getElementById('home-date-text').textContent =
    new Date().toLocaleDateString('zh-CN', { month: 'long', day: 'numeric', weekday: 'long' });

  // Progress card
  const pc = document.getElementById('progress-card');
  pc.className = 'progress-card ' + (filled ? 'complete' : 'incomplete');
  const statusMsgs = ['今天还没有记录哦','记下了 1 件 ✦','记下了 2 件 ✦✦','今天的 3 件都记下啦 ✨'];
  pc.innerHTML = `
    <div class="progress-top">
      <div>
        <div class="progress-title" style="color:${filled?'#7a4a10':'#c8906a'}">${'今日打卡'}</div>
        <div class="progress-status" style="color:${filled?'#a06820':'#b09060'}">${statusMsgs[count]}</div>
      </div>
      <div class="progress-badge" style="background:${filled?'rgba(255,255,255,0.32)':'rgba(245,168,64,0.15)'}">
        <span class="progress-badge-num" style="color:${filled?'#7a4a10':'#f5a840'}">${count}</span>
        <span class="progress-badge-den" style="color:${filled?'#a06820':'#c8906a'}"> / 3</span>
      </div>
    </div>
    <div class="progress-bars">
      ${[0,1,2].map(i => `<div class="progress-bar" style="background:${
        i < count
          ? (filled ? 'rgba(255,255,255,0.7)' : '#f5a840')
          : (filled ? 'rgba(255,255,255,0.25)' : '#e0cdb8')
      }"></div>`).join('')}
    </div>`;

  // Record button
  const btn = document.getElementById('btn-record');
  btn.className = 'btn-record ' + (count < 3 ? 'can-add' : 'full');
  btn.innerHTML = `
    <div style="text-align:left;">
      <div style="font-weight:700;font-size:13px;color:${count<3?'white':'#b09878'};margin-bottom:2px;">
        ${count < 3 ? '记录今天的开心事' : '今天已记录完啦'}
      </div>
      <div style="font-size:12px;color:${count<3?'rgba(255,255,255,0.8)':'#c8b090'}">
        ${count < 3 ? `还剩 ${3-count} 条` : '明天继续吧 ✨'}
      </div>
    </div>
    <div class="btn-record-icon" style="background:${count<3?'rgba(255,255,255,0.22)':'rgba(255,255,255,0.6)'}">
      ${count < 3 ? '✏️' : '🌟'}
    </div>`;

  // Streak
  const streak = getStreak(records);
  const streakArea = document.getElementById('streak-area');
  if (streak > 1) {
    streakArea.innerHTML = `
      <div class="streak-card">
        <span style="font-size:22px">🔥</span>
        <div>
          <div style="font-weight:700;font-size:14px;color:#c05820">连续打卡 ${streak} 天</div>
          <div style="font-size:12px;color:#a07850">乐观正在慢慢生长</div>
        </div>
      </div>`;
  } else {
    streakArea.innerHTML = '';
  }

  // Today entries
  const entriesArea = document.getElementById('entries-area');
  if (count === 0) {
    entriesArea.innerHTML = '';
    return;
  }
  const singleMode = count === 1;
  if (singleMode) openEntries = { 0: true };

  entriesArea.innerHTML = `
    <div class="entries-section">
      <div class="entries-wrap ${count > 1 ? 'multi' : ''}">
        <div class="entry-cards" id="entry-cards"></div>
      </div>
    </div>`;

  const container = document.getElementById('entry-cards');
  todayRecs.forEach((r, i) => {
    container.appendChild(createEntryCard(r, i, today, singleMode));
  });
}

function createEntryCard(r, i, dateKey, singleMode) {
  const isOpen = !!openEntries[i];
  const accent = ACCENTS[i];
  const bg = BG_COLORS[i];

  const wrap = document.createElement('div');
  wrap.className = 'swipe-wrap';
  wrap.id = `swipe-${i}`;

  // Swipe actions
  wrap.innerHTML = `
    <div class="swipe-actions">
      <button class="swipe-btn edit" onclick="event.stopPropagation();closeSwipe(${i});startEdit('${dateKey}',${i})">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        <span>编辑</span>
      </button>
      <button class="swipe-btn del" onclick="event.stopPropagation();closeSwipe(${i});askDelete('${dateKey}',${i})">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        <span>删除</span>
      </button>
    </div>`;

  const content = document.createElement('div');
  content.className = 'swipe-content';
  content.style.background = bg;
  content.style.border = `1px solid ${accent}22`;

  const reasonText = stripPrefix(esc(r.reason), '因为');
  const eventText = stripPrefix(esc(r.event), '所以');

  content.innerHTML = `
    <div class="entry-card-inner" style="cursor:${singleMode?'default':'pointer'}">
      <div class="entry-emoji">${EMOJIS[i]}</div>
      <div class="entry-text">
        <div class="entry-reason-line ${isOpen?'':'collapsed'}">
          <span class="label">因为… </span>
          <span class="value ${isOpen?'':'collapsed'}">${reasonText}</span>
        </div>
        <div class="entry-event-line ${isOpen?'':'collapsed'}">
          <span class="label">所以… </span>
          <span class="value ${isOpen?'':'collapsed'}">${eventText}</span>
        </div>
      </div>
      ${!singleMode ? `<div class="entry-chevron ${isOpen?'open':''}">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="${accent}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </div>` : ''}
    </div>`;

  // Swipe handling
  let startX = null, dx = 0, swiped = false;
  let longPressTimer = null;

  content.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    longPressTimer = setTimeout(() => {
      showContextMenu(wrap, dateKey, i);
      startX = null;
    }, 500);
  }, { passive: true });

  content.addEventListener('touchmove', e => {
    if (startX === null) return;
    const d = startX - e.touches[0].clientX;
    if (d > 8) clearTimeout(longPressTimer);
    if (d > 0) {
      dx = Math.min(d, 120);
      content.style.transition = 'none';
      content.style.transform = `translateX(-${dx}px)`;
    }
  }, { passive: true });

  content.addEventListener('touchend', () => {
    clearTimeout(longPressTimer);
    content.style.transition = '';
    if (dx > 60) {
      content.style.transform = 'translateX(-120px)';
      swiped = true;
    } else {
      content.style.transform = 'translateX(0)';
      swiped = false;
    }
    dx = 0;
    startX = null;
  });

  // Mouse long press (PC)
  content.addEventListener('mousedown', () => {
    longPressTimer = setTimeout(() => showContextMenu(wrap, dateKey, i), 600);
  });
  content.addEventListener('mouseup', () => clearTimeout(longPressTimer));
  content.addEventListener('mouseleave', () => clearTimeout(longPressTimer));

  // Click to toggle or close swipe
  content.addEventListener('click', () => {
    if (swiped) {
      content.style.transform = 'translateX(0)';
      swiped = false;
      return;
    }
    if (singleMode) return;
    openEntries[i] = !openEntries[i];
    renderHome();
  });

  wrap.appendChild(content);
  return wrap;
}

function closeSwipe(i) {
  const el = document.querySelector(`#swipe-${i} .swipe-content`);
  if (el) el.style.transform = 'translateX(0)';
}

function showContextMenu(wrap, dateKey, idx) {
  // Remove existing menus
  document.querySelectorAll('.ctx-backdrop,.ctx-menu').forEach(e => e.remove());

  const backdrop = document.createElement('div');
  backdrop.className = 'ctx-backdrop';
  backdrop.onclick = () => { backdrop.remove(); menu.remove(); };

  const menu = document.createElement('div');
  menu.className = 'ctx-menu';
  menu.innerHTML = `
    <button class="ctx-btn edit-ctx" onclick="this.closest('.ctx-menu').previousSibling.click();startEdit('${dateKey}',${idx})">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#5b9cf6" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      编辑
    </button>
    <div class="ctx-sep"></div>
    <button class="ctx-btn del-ctx" onclick="this.closest('.ctx-menu').previousSibling.click();askDelete('${dateKey}',${idx})">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#e05a3a" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
      删除
    </button>`;

  wrap.appendChild(backdrop);
  wrap.appendChild(menu);
}

// ── ADD / EDIT ──
function openAdd() {
  const records = load();
  const count = (records[todayKey()] || []).length;
  if (count >= 3) return;
  editingEntry = null;
  renderAddForm(count);
  document.getElementById('modal-add').classList.add('open');
  document.getElementById('tab-bar').classList.add('hidden');
  setTimeout(() => {
    const inp = document.getElementById('inp-event');
    if (inp) inp.focus();
  }, 400);
}

function startEdit(dateKey, idx) {
  const records = load();
  const entry = (records[dateKey] || [])[idx];
  if (!entry) return;
  editingEntry = { dateKey, idx };
  renderEditForm(entry, idx);
  document.getElementById('modal-add').classList.add('open');
  document.getElementById('tab-bar').classList.add('hidden');
}

function closeAdd() {
  document.getElementById('modal-add').classList.remove('open');
  document.getElementById('tab-bar').classList.remove('hidden');
  editingEntry = null;
  if (currentTab === 'history') {
    renderHistory();
  } else {
    renderHome();
  }
}

function renderAddForm(step) {
  const c = ACCENTS[step];
  const light = LIGHT_COLORS[step];
  const bg = BG_COLORS[step];

  document.getElementById('modal-sheet').innerHTML = `
    <div class="modal-handle"></div>
    <div class="modal-inner" style="background:${bg}">
      <div class="modal-header">
        <button class="modal-back" onclick="closeAdd()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#5a3c22" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div class="modal-title-wrap">
          <div class="modal-title">记录开心事</div>
          <div class="modal-subtitle">${todayKey()}</div>
        </div>
        <div class="step-dots">
          ${[0,1,2].map(i => `<div class="step-dot" style="width:${i===step?'18px':'7px'};background:${i<step?'#f5a840':i===step?c:'#e0d0be'}"></div>`).join('')}
        </div>
      </div>
      <div class="form-area">
        <div class="form-card">
          <div class="form-card-header">
            <div class="form-card-icon" style="background:${light}">${EMOJIS[step]}</div>
            <div>
              <div style="font-weight:700;font-size:17px;color:#3a2818">第${NUM_NAMES[step]}件开心事</div>
              <div style="font-size:12px;color:#b09070">今天已记 ${step} 件，还可记 ${3-step} 件</div>
            </div>
          </div>
          <div style="margin-bottom:14px;">
            <div class="form-label" style="color:${c}">▎ 发生了什么？</div>
            <textarea id="inp-event" class="form-textarea" style="background:${light}" rows="3" placeholder="比如：朋友突然发来一条关心的消息..."></textarea>
          </div>
          <div style="margin-bottom:auto;">
            <div class="form-label" style="color:${c}">▎ 为这件事的发生找找原因吧</div>
            <textarea id="inp-reason" class="form-textarea" style="background:${light}" rows="3" placeholder="因为这让我感到被在乎..."></textarea>
          </div>
        </div>
        <button class="btn-save" id="btn-save" onclick="saveNewEntry()" disabled
          style="background:#e8d8c4;color:#b8a080;box-shadow:none;">
          ${step === 2 ? '保存这件开心事 🎉' : '保存这件开心事 ✓'}
        </button>
      </div>
    </div>`;

  // Enable/disable save
  const updateBtn = () => {
    const ev = document.getElementById('inp-event');
    const re = document.getElementById('inp-reason');
    const btn = document.getElementById('btn-save');
    if (!ev || !re || !btn) return;
    const ok = ev.value.trim() && re.value.trim();
    btn.disabled = !ok;
    btn.style.background = ok ? `linear-gradient(135deg,${c},#e8795a)` : '#e8d8c4';
    btn.style.color = ok ? 'white' : '#b8a080';
    btn.style.boxShadow = ok ? `0 5px 16px ${c}55` : 'none';
  };
  setTimeout(() => {
    const ev = document.getElementById('inp-event');
    const re = document.getElementById('inp-reason');
    if (ev) ev.addEventListener('input', updateBtn);
    if (re) re.addEventListener('input', updateBtn);
  }, 50);
}

function renderEditForm(entry, step) {
  const c = ACCENTS[step] || ACCENTS[0];
  const light = LIGHT_COLORS[step] || LIGHT_COLORS[0];
  const bg = BG_COLORS[step] || BG_COLORS[0];

  document.getElementById('modal-sheet').innerHTML = `
    <div class="modal-handle"></div>
    <div class="modal-inner" style="background:${bg}">
      <div class="modal-header">
        <button class="modal-back" onclick="closeAdd()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#5a3c22" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div class="modal-title-wrap">
          <div class="modal-title">编辑开心事</div>
          <div class="modal-subtitle">第${NUM_NAMES[step] || '一'}件</div>
        </div>
      </div>
      <div class="form-area">
        <div class="form-card">
          <div class="form-card-header">
            <div class="form-card-icon" style="background:${light}">${EMOJIS[step] || EMOJIS[0]}</div>
            <div>
              <div style="font-weight:700;font-size:17px;color:#3a2818">修改记录</div>
              <div style="font-size:12px;color:#b09070">重新描述这件开心事</div>
            </div>
          </div>
          <div style="margin-bottom:14px;">
            <div class="form-label" style="color:${c}">▎ 发生了什么？</div>
            <textarea id="inp-event" class="form-textarea" style="background:${light}" rows="3">${esc(entry.event)}</textarea>
          </div>
          <div style="margin-bottom:auto;">
            <div class="form-label" style="color:${c}">▎ 为这件事的发生找找原因吧</div>
            <textarea id="inp-reason" class="form-textarea" style="background:${light}" rows="3">${esc(entry.reason)}</textarea>
          </div>
        </div>
        <button class="btn-save" id="btn-save" onclick="saveEditEntry()"
          style="background:linear-gradient(135deg,${c},#e8795a);color:white;box-shadow:0 5px 16px ${c}55;">
          保存修改 ✓
        </button>
      </div>
    </div>`;

  const updateBtn = () => {
    const ev = document.getElementById('inp-event');
    const re = document.getElementById('inp-reason');
    const btn = document.getElementById('btn-save');
    if (!ev || !re || !btn) return;
    const ok = ev.value.trim() && re.value.trim();
    btn.disabled = !ok;
    btn.style.background = ok ? `linear-gradient(135deg,${c},#e8795a)` : '#e8d8c4';
    btn.style.color = ok ? 'white' : '#b8a080';
    btn.style.boxShadow = ok ? `0 5px 16px ${c}55` : 'none';
  };
  setTimeout(() => {
    const ev = document.getElementById('inp-event');
    const re = document.getElementById('inp-reason');
    if (ev) ev.addEventListener('input', updateBtn);
    if (re) re.addEventListener('input', updateBtn);
  }, 50);
}

function saveNewEntry() {
  const ev = document.getElementById('inp-event').value.trim();
  const re = document.getElementById('inp-reason').value.trim();
  if (!ev || !re) return;

  document.activeElement && document.activeElement.blur();

  const today = todayKey();
  if (!appData[today]) appData[today] = [];
  const step = appData[today].length;
  if (step >= 3) return;
  appData[today].push({ id: uid(), event: ev, reason: re });
  saveDay(today, appData[today]);

  const newCount = step + 1;
  const allDone = newCount === 3;

  setTimeout(() => {
    window.scrollTo(0, 0);
    showSavedScreen(step, newCount, allDone);
  }, 150);
}

function saveEditEntry() {
  if (!editingEntry) return;
  const ev = document.getElementById('inp-event').value.trim();
  const re = document.getElementById('inp-reason').value.trim();
  if (!ev || !re) return;

  const arr = appData[editingEntry.dateKey];
  if (arr && arr[editingEntry.idx]) {
    arr[editingEntry.idx].event = ev;
    arr[editingEntry.idx].reason = re;
    saveDay(editingEntry.dateKey, arr);
  }
  closeAdd();
}

function showSavedScreen(step, newCount, allDone) {
  const nextStep = newCount;
  const nextC = ACCENTS[nextStep] || ACCENTS[0];

  document.getElementById('modal-sheet').innerHTML = `
    <div class="saved-screen">
      <div class="saved-emoji">${allDone ? '🎉' : '✨'}</div>
      <div style="font-weight:700;font-size:22px;color:#3a2818;text-align:center">
        ${allDone ? '今天的 3 件都记下来啦！' : `第${NUM_NAMES[step]}件记下来了`}
      </div>
      <p style="font-size:14px;color:#9a7858;text-align:center;line-height:1.8;">
        ${allDone ? '今天的乐观练习完成了 🌱' : `今天还可以再记 ${3 - newCount} 件`}
      </p>
      <div style="display:flex;flex-direction:column;gap:10px;width:100%;margin-top:8px;">
        ${!allDone ? `<button class="btn-continue" onclick="continueAdd(${newCount})"
          style="background:linear-gradient(135deg,${nextC},#e8795a);color:white;box-shadow:0 5px 16px ${nextC}55;">
          继续记录第${NUM_NAMES[nextStep]}件 →
        </button>` : ''}
        <button class="btn-continue" onclick="closeAdd()"
          style="background:${allDone ? 'linear-gradient(135deg,#f5a840,#e8795a)' : 'white'};
                 color:${allDone ? 'white' : '#8a6848'};
                 border:${allDone ? 'none' : '1.5px solid #e8d8c4'};
                 box-shadow:${allDone ? '0 5px 16px rgba(245,168,64,0.3)' : 'none'};">
          回到首页
        </button>
      </div>
    </div>`;
}

function continueAdd(step) {
  renderAddForm(step);
  setTimeout(() => {
    const inp = document.getElementById('inp-event');
    if (inp) inp.focus();
  }, 100);
}

// ── DELETE ──
function askDelete(dateKey, idx) {
  deleteTarget = { dateKey, idx };
  document.getElementById('delete-overlay').style.display = '';
}
function cancelDelete() {
  deleteTarget = null;
  document.getElementById('delete-overlay').style.display = 'none';
}
function confirmDelete() {
  if (!deleteTarget) return;
  const arr = appData[deleteTarget.dateKey];
  if (arr) {
    arr.splice(deleteTarget.idx, 1);
    saveDay(deleteTarget.dateKey, arr.length > 0 ? arr : null);
  }
  deleteTarget = null;
  document.getElementById('delete-overlay').style.display = 'none';
  openEntries = {};
  if (currentTab === 'history') {
    renderHistory();
  } else {
    renderHome();
  }
}

// ── HISTORY ──
function renderHistory() {
  const data = load();
  const allDates = Object.keys(data).filter(k => data[k] && data[k].length > 0).sort((a,b) => b.localeCompare(a));

  const countEl = document.getElementById('history-count');
  countEl.textContent = allDates.length > 0 ? `共 ${allDates.length} 天` : '';
  countEl.style.display = allDates.length > 0 ? '' : 'none';

  const content = document.getElementById('history-content');

  // Mini calendar (always show)
  const now = new Date();
  const yr = now.getFullYear(), mo = now.getMonth() + 1;
  const daysInMonth = new Date(yr, mo, 0).getDate();
  const monthKey = `${yr}-${String(mo).padStart(2,'0')}`;
  const monthCount = allDates.filter(d => d.startsWith(monthKey)).length;

  let html = `
    <div class="mini-cal">
      <div class="mini-cal-header">
        <span style="font-weight:600;font-size:13px;color:#5a3c22">本月打卡</span>
        <span style="font-size:12px;color:#e8845a;font-weight:600">${monthCount} 天 ❤️</span>
      </div>
      <div class="mini-cal-grid">
        ${Array.from({length: daysInMonth}, (_, i) => {
          const d = i + 1;
          const k = `${yr}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
          const has = data[k] && data[k].length > 0;
          const isToday = k === todayKey();
          return `<div class="mini-cal-day" style="
            background:${has ? '#f5a840' : isToday ? '#fff3e0' : '#f5ede0'};
            font-weight:${isToday ? '600' : '400'};
            color:${has ? 'white' : isToday ? '#f5a840' : '#c0b098'};
            border:${isToday && !has ? '1.5px solid #f5a840' : 'none'};
          ">${d}</div>`;
        }).join('')}
      </div>
    </div>`;

  if (allDates.length === 0) {
    html += `
      <div class="empty-state">
        <span style="font-size:48px">📭</span>
        <p style="font-weight:600;font-size:15px;color:#c8a882">还没有记录</p>
        <p style="font-size:13px;color:#b8a080">从首页开始记录今天的开心事吧</p>
      </div>`;
    content.innerHTML = html;
    return;
  }

  // Date list
  const pendingDetails = [];
  html += '<div class="history-list">';
  allDates.forEach(date => {
    const recs = data[date] || [];
    const isToday = date === todayKey();
    const open = historyExpanded === date;

    html += `
    <div class="history-date-card">
      <button class="history-date-btn" onclick="toggleHistoryDate('${date}')">
        <div class="history-date-left">
          <div class="history-date-icon" style="background:${isToday ? 'linear-gradient(135deg,#f5a840,#e8795a)' : '#fff3e4'}">
            <span style="font-size:16px;font-weight:700;color:${isToday?'white':'#f5a840'};line-height:1.1">${date.split('-')[2]}</span>
            <span style="font-size:9px;color:${isToday?'rgba(255,255,255,0.8)':'#c8906a'}">${+date.split('-')[1]}月</span>
          </div>
          <div style="text-align:left">
            <div style="font-weight:600;font-size:14px;color:#3a2818">
              ${fmtDate(date)}${isToday ? '<span style="font-size:11px;color:#e8845a;margin-left:5px;font-weight:500">今天</span>' : ''}
            </div>
            <div style="font-size:11px;color:#b09070">${fmtWeek(date)} · ${recs.length} 件开心事</div>
          </div>
        </div>
        <div class="history-date-right">
          <div class="history-dots">
            ${[0,1,2].map(i => `<div class="history-dot" style="background:${i<recs.length?'#f5a840':'#e8d8c4'}"></div>`).join('')}
          </div>
          <div class="history-chevron ${open?'open':''}">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#c8a882" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
          </div>
        </div>
      </button>`;

    if (open) {
      html += `<div class="history-detail" id="hist-detail-${date}"></div>`;
      // Cards will be rendered dynamically after innerHTML is set
      pendingDetails.push({ date, recs });
    }

    html += '</div>';
  });
  html += '</div>';

  content.innerHTML = html;

  // Render swipeable cards for expanded dates
  pendingDetails.forEach(({ date, recs }) => {
    const container = document.getElementById(`hist-detail-${date}`);
    if (!container) return;
    recs.forEach((r, i) => {
      container.appendChild(createHistoryEntryCard(r, i, date));
    });
  });
}

function createHistoryEntryCard(r, i, dateKey) {
  const accent = ACCENTS[i] || ACCENTS[0];
  const bg = BG_COLORS[i] || BG_COLORS[0];
  const reasonText = stripPrefix(esc(r.reason), '因为');
  const eventText = stripPrefix(esc(r.event), '所以');

  const wrap = document.createElement('div');
  wrap.className = 'swipe-wrap';
  wrap.style.marginTop = '10px';

  wrap.innerHTML = `
    <div class="swipe-actions">
      <button class="swipe-btn edit" onclick="event.stopPropagation();closeHistSwipe(this);startEdit('${dateKey}',${i})">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        <span>编辑</span>
      </button>
      <button class="swipe-btn del" onclick="event.stopPropagation();closeHistSwipe(this);askDelete('${dateKey}',${i})">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        <span>删除</span>
      </button>
    </div>`;

  const content = document.createElement('div');
  content.className = 'swipe-content';
  content.style.background = bg;
  content.style.border = `1px solid ${accent}22`;
  content.style.borderRadius = '14px';
  content.style.padding = '12px 14px';

  content.innerHTML = `
    <div style="display:flex;align-items:flex-start;gap:10px;">
      <div style="font-size:16px;flex-shrink:0;margin-top:2px">${EMOJIS[i] || EMOJIS[0]}</div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:14px;color:#3a2818;line-height:1.5;">
          <span>因为… </span><span style="font-weight:600">${reasonText}</span>
        </div>
        <div style="font-size:12px;color:#9a7858;line-height:1.6;margin-top:3px;">
          <span>所以… </span><span style="font-weight:600">${eventText}</span>
        </div>
      </div>
    </div>`;

  // Swipe handling
  let startX = null, dx = 0, swiped = false;
  let longPressTimer = null;

  content.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    longPressTimer = setTimeout(() => {
      showContextMenu(wrap, dateKey, i);
      startX = null;
    }, 500);
  }, { passive: true });

  content.addEventListener('touchmove', e => {
    if (startX === null) return;
    const d = startX - e.touches[0].clientX;
    if (d > 8) clearTimeout(longPressTimer);
    if (d > 0) {
      dx = Math.min(d, 120);
      content.style.transition = 'none';
      content.style.transform = `translateX(-${dx}px)`;
    }
  }, { passive: true });

  content.addEventListener('touchend', () => {
    clearTimeout(longPressTimer);
    content.style.transition = '';
    if (dx > 60) {
      content.style.transform = 'translateX(-120px)';
      swiped = true;
    } else {
      content.style.transform = 'translateX(0)';
      swiped = false;
    }
    dx = 0;
    startX = null;
  });

  content.addEventListener('mousedown', () => {
    longPressTimer = setTimeout(() => showContextMenu(wrap, dateKey, i), 600);
  });
  content.addEventListener('mouseup', () => clearTimeout(longPressTimer));
  content.addEventListener('mouseleave', () => clearTimeout(longPressTimer));

  content.addEventListener('click', () => {
    if (swiped) {
      content.style.transform = 'translateX(0)';
      swiped = false;
    }
  });

  wrap.appendChild(content);
  return wrap;
}

function closeHistSwipe(btn) {
  const wrap = btn.closest('.swipe-wrap');
  const el = wrap && wrap.querySelector('.swipe-content');
  if (el) el.style.transform = 'translateX(0)';
}

function toggleHistoryDate(date) {
  historyExpanded = historyExpanded === date ? null : date;
  renderHistory();
}

// ── Init ──
// Auth state listener handles everything — shows login or app
document.getElementById('tab-bar').classList.add('hidden');
</script>
</body>
</html>
